name: Build nmos-cpp Registry

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout nmos-simple-rds-studio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout nmos-cpp
        uses: actions/checkout@v4
        with:
          repository: sony/nmos-cpp
          ref: master
          submodules: recursive
          path: _nmos-cpp-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies via Conan
        working-directory: _nmos-cpp-src/Development
        run: conan install . --build=missing -s build_type=Release -s compiler.cppstd=17 --output-folder=build

      - name: Configure CMake
        working-directory: _nmos-cpp-src/Development
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake -DNMOS_CPP_BUILD_LLDP=OFF -DNMOS_CPP_BUILD_TESTS=OFF

      - name: Build nmos-cpp-registry
        working-directory: _nmos-cpp-src/Development
        run: cmake --build build --config Release --target nmos-cpp-registry

      - name: Copy binary to bin/
        run: |
          $exe = Get-ChildItem -Path _nmos-cpp-src/Development/build -Recurse -Filter "nmos-cpp-registry.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination bin/win/x64/nmos-cpp-registry.exe -Force
          echo "Copied: $($exe.FullName)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/win/x64/nmos-cpp-registry.exe
          git commit -m "ci: add nmos-cpp-registry.exe for Windows x64 [skip ci]"
          git push
