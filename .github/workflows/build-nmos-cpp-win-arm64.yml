name: Build nmos-cpp Registry (Windows ARM64)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-arm64:
    name: Build Windows ARM64
    runs-on: windows-11-arm

    steps:
      - name: Checkout nmos-simple-rds-studio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout nmos-cpp
        uses: actions/checkout@v4
        with:
          repository: sony/nmos-cpp
          ref: master
          submodules: recursive
          path: _nmos-cpp-src

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip
        run: python -m pip install --upgrade pip

      - name: Install Conan
        run: pip install conan~=2.20

      - name: Install CMake and Ninja
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y

      - name: Install Bonjour (x64 SDK — ARM64 compatible headers)
        run: |
          curl -L https://download.info.apple.com/Mac_OS_X/061-8098.20100603.gthyu/BonjourPSSetup.exe -o BonjourPSSetup.exe -q
          & 7z.exe e BonjourPSSetup.exe Bonjour64.msi -y
          msiexec /i ${{ github.workspace }}\Bonjour64.msi /qn /norestart

      - name: Enable Conan
        shell: bash
        run: |
          echo "CMAKE_EXTRA_ARGS=-DCMAKE_PROJECT_TOP_LEVEL_INCLUDES:STRING=\"third_party/cmake/conan_provider.cmake\" -DCONAN_INSTALL_ARGS:STRING=\"--build=missing;--options;cpprestsdk/*:http_client_impl=asio;--options;cpprestsdk/*:http_listener_impl=asio\" -DNMOS_CPP_BUILD_LLDP=OFF -DNMOS_CPP_BUILD_TESTS=OFF" >> $GITHUB_ENV

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Setup MSVC developer command prompt (ARM64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Build nmos-cpp
        uses: lukka/run-cmake@v3.4
        with:
          cmakeListsOrSettingsJson: CMakeListsTxtAdvanced
          cmakeListsTxtPath: '${{ github.workspace }}/_nmos-cpp-src/Development/CMakeLists.txt'
          buildDirectory: '${{ runner.workspace }}/nmos-cpp-build'
          cmakeAppendedArgs: '-GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl.exe -DCMAKE_CXX_COMPILER=cl.exe ${{ env.CMAKE_EXTRA_ARGS }}'
          buildWithCMakeArgs: '--target nmos-cpp-registry'

      - name: Copy binary to bin/
        shell: bash
        run: |
          mkdir -p bin/win/arm64
          exe=$(find "${{ runner.workspace }}/nmos-cpp-build" -name "nmos-cpp-registry.exe" | head -1)
          cp "$exe" bin/win/arm64/nmos-cpp-registry.exe
          echo "Copied: $exe"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/win/arm64/nmos-cpp-registry.exe
          git commit -m "ci: add nmos-cpp-registry.exe for Windows ARM64 [skip ci]"
          git push
