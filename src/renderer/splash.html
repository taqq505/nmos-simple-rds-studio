<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src *">
  <title>NMOS Simple RDS Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      overflow: hidden;
      user-select: none;
    }

    /* ── CSS Custom Properties ── */
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f9f9f9;
      --color-bg-tertiary: #f5f5f5;
      --color-border-default: #e0e0e0;
      --color-border-medium: #cccccc;
      --color-text-primary: #111111;
      --color-text-secondary: #666666;
      --color-text-tertiary: #bbbbbb;
      --color-blue-50: #E6F1FB;
      --color-blue-600: #185FA5;
      --color-blue-800: #0C447C;
      --color-green-50: #EAF3DE;
      --color-green-600: #3B6D11;
      --color-green-700: #27500A;
      --color-amber-50: #FAEEDA;
      --color-amber-600: #854F0B;
      --color-red-50: #FCEBEB;
      --color-red-600: #A32D2D;
      --color-purple-50: #EEEDFE;
      --color-purple-600: #534AB7;
      --color-purple-800: #3C3489;
    }

    .window {
      width: 100%;
      height: 100%;
      background: var(--color-bg-primary);
      display: flex;
      flex-direction: column;
    }

    /* ── Step progress indicator ── */
    .step-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 0 0;
    }
    .step-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--color-text-tertiary);
      transition: background 0.2s;
    }
    .step-dot.active { background: var(--color-blue-600); }
    .step-dot.done { background: var(--color-green-600); }
    .step-dot.error { background: var(--color-red-600); }

    /* ── Content area ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 20px 16px;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      border: 2px solid #ddd;
      border-top-color: #378ADD;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .spinner-sm { width: 10px; height: 10px; border-width: 1.5px; }
    .spinner-md { width: 14px; height: 14px; }
    .spinner-lg { width: 28px; height: 28px; border-width: 3px; border-color: #B5D4F4; border-top-color: var(--color-blue-600); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--color-blue-600);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover { background: var(--color-blue-800); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 0.5px solid var(--color-border-medium);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: var(--color-bg-secondary); }
    .btn-back {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 0.5px solid var(--color-border-medium);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    /* ── Form elements ── */
    .form-label {
      font-size: 11px;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .form-hint { font-size: 10px; color: var(--color-text-tertiary); margin-left: auto; }
    .form-input, .form-select {
      width: 100%;
      height: 30px;
      border: 0.5px solid var(--color-border-medium);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--color-blue-600);
    }
    .form-group { display: flex; flex-direction: column; margin-bottom: 8px; }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }

    /* ── Section label ── */
    .sec-label {
      font-size: 10px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .sec-divider { height: 0.5px; background: var(--color-border-default); margin: 8px 0; }

    /* ── Badges ── */
    .badge {
      font-size: 10px;
      border-radius: 99px;
      padding: 2px 8px;
      font-weight: 500;
    }
    .badge-green { background: var(--color-green-50); color: var(--color-green-600); }
    .badge-blue  { background: var(--color-blue-50);  color: var(--color-blue-800); }
    .badge-amber { background: var(--color-amber-50); color: var(--color-amber-600); }
    .badge-red   { background: var(--color-red-50);   color: var(--color-red-600); }

    /* ── Notice bar ── */
    .notice {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      border-radius: 8px;
      padding: 7px 10px;
      margin-bottom: 12px;
    }
    .notice-amber { background: var(--color-amber-50); color: var(--color-amber-600); }
    .notice-blue  { background: var(--color-blue-50);  color: var(--color-blue-800); }
  </style>
</head>
<body>
<div class="window">
  <!-- Step progress dots -->
  <div class="step-dots" id="step-dots">
    <div class="step-dot active" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
    <div class="step-dot" id="dot-3"></div>
  </div>

  <!-- Dynamic content area — steps are injected by splash.js -->
  <div class="content" id="content"></div>
</div>

<script src="splash.js"></script>
</body>
</html>
