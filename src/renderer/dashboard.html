<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src *">
  <title>NMOS Simple RDS Studio – Dashboard</title>
  <style>
    /* ── Reset & Variables ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f9f9f9;
      --color-bg-tertiary: #f5f5f5;
      --color-border-default: #e0e0e0;
      --color-border-medium: #cccccc;
      --color-text-primary: #111111;
      --color-text-secondary: #666666;
      --color-text-tertiary: #bbbbbb;
      --color-blue-50: #E6F1FB;
      --color-blue-600: #185FA5;
      --color-blue-800: #0C447C;
      --color-green-50: #EAF3DE;
      --color-green-600: #3B6D11;
      --color-green-700: #27500A;
      --color-amber-50: #FAEEDA;
      --color-amber-600: #854F0B;
      --color-red-50: #FCEBEB;
      --color-red-600: #A32D2D;
      --color-purple-50: #EEEDFE;
      --color-purple-600: #534AB7;
      --color-purple-800: #3C3489;
      --sidebar-width: 180px;
      --statusbar-height: 28px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Toolbar (connection URL + Stop RDS) ── */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--color-bg-secondary);
      border-bottom: 0.5px solid var(--color-border-default);
      flex-shrink: 0;
    }
    .titlebar-title { font-size: 12px; color: #888; }
    .titlebar-spacer { flex: 1; }
    .titlebar-url {
      font-size: 11px;
      font-family: monospace;
      color: var(--color-text-secondary);
      background: var(--color-bg-tertiary);
      border: 0.5px solid var(--color-border-default);
      border-radius: 6px;
      padding: 3px 8px;
      -webkit-app-region: no-drag;
    }
    .btn-stop {
      font-size: 11px;
      color: var(--color-red-600);
      background: var(--color-red-50);
      border: 0.5px solid #f5c6c6;
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .btn-stop:hover { background: #f8d7d7; }

    /* ── Layout ── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--color-bg-secondary);
      border-right: 0.5px solid var(--color-border-default);
      display: flex;
      flex-direction: column;
      padding: 12px 0;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .nav-section {
      font-size: 10px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.06em;
      padding: 8px 16px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
    }
    .nav-item:hover { background: var(--color-bg-tertiary); }
    .nav-item.active {
      background: var(--color-blue-50);
      color: var(--color-blue-600);
      font-weight: 500;
    }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ── Status bar ── */
    .statusbar {
      height: var(--statusbar-height);
      background: var(--color-bg-secondary);
      border-top: 0.5px solid var(--color-border-default);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
      font-size: 11px;
      color: var(--color-text-secondary);
      flex-shrink: 0;
    }
    .status-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #28C840;
      display: inline-block;
      margin-right: 4px;
    }
    .sb-spacer { flex: 1; }

    /* ── Page structure ── */
    .page-header { margin-bottom: 20px; }
    .page-title { font-size: 18px; font-weight: 600; color: var(--color-text-primary); }
    .page-subtitle { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
      color: var(--color-text-tertiary); text-transform: uppercase; margin: 20px 0 8px; }

    /* ── Metric cards ── */
    .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .metric-card { background: var(--color-bg-secondary); border: 0.5px solid var(--color-border-default);
      border-radius: 10px; padding: 16px 20px; }
    .metric-value { font-size: 28px; font-weight: 600; color: var(--color-text-primary); }
    .metric-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

    /* ── Data table ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .data-table th { text-align: left; padding: 6px 10px; font-size: 10px; font-weight: 600;
      color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 0.5px solid var(--color-border-default); }
    .data-table td { padding: 7px 10px; border-bottom: 0.5px solid var(--color-bg-tertiary);
      color: var(--color-text-primary); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--color-bg-secondary); }
    .empty-cell { text-align: center; color: var(--color-text-tertiary); padding: 24px !important; }
    .id-small { font-size: 10px; color: var(--color-text-secondary); }

    /* ── Chips ── */
    .chip { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px;
      background: var(--color-bg-tertiary); color: var(--color-text-secondary);
      border: 0.5px solid var(--color-border-default); }
    .chip-blue   { background: var(--color-blue-50);   color: var(--color-blue-600);   border-color: #c5daf5; }
    .chip-green  { background: var(--color-green-50);  color: var(--color-green-600);  border-color: #c5dfa0; }
    .chip-amber  { background: var(--color-amber-50);  color: var(--color-amber-600);  border-color: #f5ddb0; }
    .chip-purple { background: var(--color-purple-50); color: var(--color-purple-600); border-color: #d0cef9; }
    .chip-red    { background: var(--color-red-50);    color: var(--color-red-600);    border-color: #f5c6c6; }

    /* ── Filter pills ── */
    .filter-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; cursor: pointer;
      background: var(--color-bg-secondary); border: 0.5px solid var(--color-border-default);
      color: var(--color-text-secondary); }
    .filter-pill:hover { background: var(--color-bg-tertiary); }
    .filter-pill.active { background: var(--color-blue-50); color: var(--color-blue-600);
      border-color: #c5daf5; font-weight: 500; }

    /* ── Tabs ── */
    .tab-filter-row { display: flex; align-items: center; gap: 16px; margin-bottom: 4px; flex-wrap: wrap; }
    .tabs { display: flex; gap: 0; border: 0.5px solid var(--color-border-default);
      border-radius: 6px; overflow: hidden; }
    .tab { font-size: 12px; padding: 4px 14px; cursor: pointer; background: var(--color-bg-secondary);
      border: none; color: var(--color-text-secondary); }
    .tab:hover { background: var(--color-bg-tertiary); }
    .tab.active { background: var(--color-blue-50); color: var(--color-blue-600); font-weight: 500; }

    /* ── Accordion ── */
    .accordion { display: flex; flex-direction: column; gap: 6px; }
    .accordion-item { border: 0.5px solid var(--color-border-default); border-radius: 8px; overflow: hidden; }
    .accordion-header { display: flex; align-items: center; gap: 8px; padding: 9px 14px;
      cursor: pointer; background: var(--color-bg-secondary); font-size: 13px; user-select: none; }
    .accordion-header:hover { background: var(--color-bg-tertiary); }
    .acc-arrow { font-size: 9px; color: var(--color-text-tertiary); transition: transform 0.15s; flex-shrink: 0; }
    .acc-title { font-weight: 500; flex: 1; }
    .acc-meta { font-size: 11px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 6px; }
    .accordion-body { display: none; padding: 12px 14px; background: var(--color-bg-primary);
      border-top: 0.5px solid var(--color-border-default); }
    .accordion-body.open { display: block; }
    .detail-grid { display: grid; grid-template-columns: 100px 1fr; gap: 4px 12px;
      font-size: 12px; margin-bottom: 12px; }
    .dk { color: var(--color-text-tertiary); font-size: 11px; }
    .device-block { border: 0.5px solid var(--color-border-default); border-radius: 6px;
      margin-top: 8px; overflow: hidden; }
    .device-title { padding: 7px 12px; background: var(--color-bg-secondary); font-size: 12px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .sub-list { padding: 4px 12px 6px; }
    .sub-item { font-size: 11px; padding: 2px 0; color: var(--color-text-secondary);
      display: flex; align-items: center; gap: 6px; }
    .arrow-out { color: var(--color-green-600); font-size: 10px; }
    .arrow-in  { color: var(--color-purple-600); font-size: 10px; }

    /* ── Status dot ── */
    .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-border-medium); margin-right: 5px; vertical-align: middle; }
    .status-dot.active { background: #28C840; }

    /* ── Log viewer ── */
    .log-toolbar { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
    .log-toolbar .filter-pills { margin-bottom: 0; }
    .log-level-ctrl { display: flex; align-items: center; gap: 6px; font-size: 11px;
      color: var(--color-text-secondary); }
    .log-viewer { flex: 1; overflow-y: auto; background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border-default); border-radius: 8px;
      font-family: monospace; font-size: 11px; padding: 8px;
      max-height: calc(100vh - 260px); }
    .log-line { display: flex; gap: 8px; padding: 2px 0; border-bottom: 0.5px solid var(--color-bg-tertiary); }
    .log-ts  { color: var(--color-text-tertiary); flex-shrink: 0; font-size: 10px; }
    .log-lvl { width: 50px; flex-shrink: 0; font-weight: 600; font-size: 10px; }
    .log-msg { color: var(--color-text-primary); }
    .log-info  .log-lvl { color: var(--color-blue-600); }
    .log-warn  .log-lvl { color: var(--color-amber-600); }
    .log-error .log-lvl { color: var(--color-red-600); }

    /* ── SDP modal ── */
    .sdp-modal { position: absolute; top: 40px; right: 24px; width: 480px; max-height: 60vh;
      background: var(--color-bg-primary); border: 0.5px solid var(--color-border-medium);
      border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex; flex-direction: column; z-index: 100; }
    .sdp-header { display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; background: var(--color-bg-secondary);
      border-bottom: 0.5px solid var(--color-border-default);
      border-radius: 10px 10px 0 0; font-size: 12px; font-weight: 500; }
    .sdp-close { background: none; border: none; cursor: pointer; font-size: 14px;
      color: var(--color-text-secondary); padding: 2px 6px; border-radius: 4px; }
    .sdp-close:hover { background: var(--color-bg-tertiary); }
    .sdp-content { padding: 12px; font-size: 10px; overflow-y: auto; white-space: pre;
      color: var(--color-text-primary); }

    /* ── Settings ── */
    .settings-form { max-width: 520px; }
    .settings-group { border: 0.5px solid var(--color-border-default); border-radius: 10px;
      overflow: hidden; margin-bottom: 16px; }
    .setting-row { display: flex; align-items: center; gap: 16px; padding: 9px 16px;
      border-bottom: 0.5px solid var(--color-bg-tertiary); font-size: 13px; }
    .setting-row:last-child { border-bottom: none; }
    .sk { width: 140px; flex-shrink: 0; font-size: 12px; color: var(--color-text-secondary); }
    .sv { color: var(--color-text-primary); }
    .s-input { flex: 1; font-size: 12px; padding: 4px 8px; border: 0.5px solid var(--color-border-medium);
      border-radius: 5px; background: var(--color-bg-primary); color: var(--color-text-primary); }
    .s-input:focus { outline: none; border-color: var(--color-blue-600); }
    .warn-text { font-size: 11px; color: var(--color-amber-600); }
    .settings-actions { display: flex; gap: 8px; }
    .btn-primary { font-size: 12px; padding: 6px 16px; background: var(--color-blue-600);
      color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .btn-primary:hover { background: var(--color-blue-800); }
    .btn-danger { font-size: 12px; padding: 6px 16px; background: var(--color-red-50);
      color: var(--color-red-600); border: 0.5px solid #f5c6c6; border-radius: 6px; cursor: pointer; }
    .btn-danger:hover { background: #f8d7d7; }
    .btn-link { font-size: 11px; color: var(--color-blue-600); background: none; border: none;
      cursor: pointer; text-decoration: underline; padding: 0; }

    /* ── States ── */
    .state-box { padding: 32px; text-align: center; font-size: 12px; color: var(--color-text-tertiary);
      border: 0.5px dashed var(--color-border-default); border-radius: 10px; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px; }
    .state-error { color: var(--color-red-600); border-color: #f5c6c6; background: var(--color-red-50); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--color-border-default);
      border-top-color: var(--color-blue-600); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-title">NMOS Simple RDS Studio</span>
  <div class="titlebar-spacer"></div>
  <span class="titlebar-url" id="tb-url">—</span>
  <button class="btn-stop" id="btn-stop">Stop RDS</button>
</div>

<div class="app-body">
  <nav class="sidebar">
    <div class="nav-section">DASHBOARD</div>
    <div class="nav-item active" data-page="overview">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      Overview
    </div>
    <div class="nav-item" data-page="log">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 4h10M2 7h8M2 10h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Log
    </div>

    <div class="nav-section">RESOURCES</div>
    <div class="nav-item" data-page="nodes">
      <span class="nav-dot" style="background:#185FA5;"></span>
      Nodes
    </div>
    <div class="nav-item" data-page="senders">
      <span class="nav-dot" style="background:#3B6D11;"></span>
      Senders
    </div>
    <div class="nav-item" data-page="receivers">
      <span class="nav-dot" style="background:#534AB7;"></span>
      Receivers
    </div>
    <div class="nav-item" data-page="flows">
      <span class="nav-dot" style="background:#854F0B;"></span>
      Flows / Sources
    </div>

    <div class="nav-section">SETTINGS</div>
    <div class="nav-item" data-page="settings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.93 2.93l1.41 1.41M9.66 9.66l1.41 1.41M2.93 11.07l1.41-1.41M9.66 4.34l1.41-1.41"
              stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Settings
    </div>
  </nav>

  <main class="main-content" id="main-content">
    <!-- Page content rendered here by dashboard.js -->
    <div style="color:#bbb; font-size:13px;">Loading...</div>
  </main>
</div>

<footer class="statusbar">
  <span><span class="status-live-dot" id="sb-dot"></span><span id="sb-status">Connecting...</span></span>
  <span id="sb-mdns">—</span>
  <span id="sb-priority">—</span>
  <span class="sb-spacer"></span>
  <span id="sb-uptime">Uptime: —</span>
</footer>

<script src="dashboard.js"></script>
</body>
</html>
