<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src *">
  <title>NMOS Simple RDS Studio</title>
  <style>
    /* ── Reset ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design Tokens ── */
    :root {
      --bg-primary:    #ffffff;
      --bg-secondary:  #f9f9f9;
      --bg-tertiary:   #f5f5f5;
      --border-default: #e0e0e0;
      --border-medium:  #cccccc;
      --border-focus:   #185FA5;
      --text-primary:   #111111;
      --text-secondary: #666666;
      --text-tertiary:  #bbbbbb;
      --text-mono:      #444444;
      --blue-50:    #E6F1FB;  --blue-600:   #185FA5;  --blue-800:   #0C447C;
      --green-50:   #EAF3DE;  --green-600:  #3B6D11;  --green-700:  #27500A;
      --amber-50:   #FAEEDA;  --amber-600:  #854F0B;
      --red-50:     #FCEBEB;  --red-600:    #A32D2D;  --red-800:    #791F1F;
      --purple-50:  #EEEDFE;  --purple-600: #534AB7;  --purple-800: #3C3489;
      --gray-live:  #28C840;
      --sidebar-w:  180px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── App Header ── */
    .app-header {
      height: 36px; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px 0 16px;
      background: var(--bg-secondary);
      border-bottom: 0.5px solid var(--border-default);
    }
    .app-header-logo {
      width: 20px; height: 20px; border-radius: 5px;
      background: var(--blue-50); border: 0.5px solid #B5D4F4;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .app-header-name {
      font-size: 12px; font-weight: 500; color: var(--text-primary);
      flex: 1;
    }
    .app-header-url {
      font-size: 10px; font-family: monospace; color: var(--text-tertiary);
      max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .app-header-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 99px;
      background: var(--green-50); color: var(--green-600);
      font-weight: 500; flex-shrink: 0;
    }

    /* ── Body Layout ── */
    .body-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      border-right: 0.5px solid var(--border-default);
      padding: 12px 0;
      background: var(--bg-secondary);
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .nav-section-label {
      font-size: 10px; color: var(--text-tertiary);
      padding: 12px 16px 4px; letter-spacing: 0.05em;
    }
    .nav-item {
      padding: 7px 16px; font-size: 13px; cursor: pointer;
      border-radius: 6px; margin: 0 8px 1px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 8px;
      transition: background 0.15s;
    }
    .nav-item:hover { background: var(--bg-primary); }
    .nav-item.active { background: var(--bg-primary); color: var(--text-primary); font-weight: 500; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Main Area ── */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Page Toolbar ── */
    .page-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-bottom: 0.5px solid var(--border-default);
      flex-shrink: 0; background: var(--bg-primary);
    }
    .page-title { font-size: 15px; font-weight: 500; color: var(--text-primary); flex: 1; }
    .page-toolbar-sub {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      border-bottom: 0.5px solid var(--border-default);
      background: var(--bg-secondary); flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* ── Page Content ── */
    .page-content { flex: 1; overflow-y: auto; padding: 14px 16px; }

    /* ── Status Bar ── */
    .statusbar {
      display: flex; align-items: center; gap: 16px;
      padding: 6px 16px;
      border-top: 0.5px solid var(--border-default);
      background: var(--bg-secondary);
      font-size: 11px; color: var(--text-secondary);
      flex-shrink: 0;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gray-live); display: inline-block; margin-right: 4px;
    }
    .sb-spacer { flex: 1; }

    /* ── Count Badge ── */
    .count-badge {
      font-size: 11px; padding: 2px 10px; border-radius: 99px;
      border: 0.5px solid var(--border-default); background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    /* ── Search Input ── */
    .search-input {
      font-size: 12px; padding: 4px 10px; border-radius: 8px;
      border: 0.5px solid var(--border-medium);
      background: var(--bg-primary); color: var(--text-primary);
      width: 160px;
    }
    .search-input:focus { outline: none; border-color: var(--blue-600); }
    .search-input::placeholder { color: var(--text-tertiary); }

    /* ── Filter Buttons ── */
    .filter-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 99px; cursor: pointer;
      border: 0.5px solid var(--border-medium); background: transparent;
      color: var(--text-secondary); transition: background 0.15s;
    }
    .filter-btn:hover { background: var(--bg-tertiary); }
    .filter-btn.active-all     { background: var(--bg-secondary); color: var(--text-primary); font-weight: 500; border-color: var(--border-medium); }
    .filter-btn.active-info    { background: var(--blue-50);   color: var(--blue-800);   border-color: #B5D4F4; }
    .filter-btn.active-warning { background: var(--amber-50);  color: var(--amber-600);  border-color: #FAC775; }
    .filter-btn.active-error   { background: var(--red-50);    color: var(--red-600);    border-color: #F7C1C1; }
    .filter-btn.active-video   { background: var(--blue-50);   color: var(--blue-800);   border-color: #B5D4F4; }
    .filter-btn.active-audio   { background: var(--green-50);  color: var(--green-700);  border-color: #C0DD97; }
    .filter-btn.active-anc     { background: var(--purple-50); color: var(--purple-800); border-color: #AFA9EC; }
    .filter-btn.active-connected { background: var(--green-50); color: var(--green-600); border-color: #C0DD97; }
    .filter-btn.active-idle    { background: var(--bg-secondary); color: var(--text-secondary); border-color: var(--border-medium); font-weight: 500; }

    /* ── Tabs ── */
    .tab-group { display: flex; border: 0.5px solid var(--border-medium); border-radius: 8px; overflow: hidden; }
    .tab-btn { font-size: 12px; padding: 4px 14px; cursor: pointer; background: transparent; border: none; color: var(--text-secondary); }
    .tab-btn:hover { background: var(--bg-tertiary); }
    .tab-btn.active { background: var(--bg-secondary); font-weight: 500; color: var(--text-primary); }
    .filter-label { font-size: 11px; color: var(--text-tertiary); }

    /* ── Metric Cards ── */
    .metric-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
    .metric-card { background: var(--bg-secondary); border: 0.5px solid var(--border-default); border-radius: 8px; padding: 10px 14px; }
    .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 500; color: var(--text-primary); }

    /* ── Section Title ── */
    .section-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }

    /* ── Data Table ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th { text-align: left; padding: 6px 10px; font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 0.5px solid var(--border-default); }
    .data-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--border-default); color: var(--text-primary); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg-secondary); }

    /* ── Heartbeat Bar ── */
    .hb-bar { display: flex; align-items: center; gap: 6px; }
    .hb-track { width: 96px; height: 4px; background: var(--bg-tertiary); border-radius: 2px; flex-shrink: 0; }
    .hb-fill { height: 4px; border-radius: 2px; transition: width 0.5s ease, background 0.5s ease; }
    .hb-text { font-size: 11px; font-family: monospace; color: var(--text-tertiary); width: 28px; }

    /* ── Status Pill ── */
    .pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .pill-green  { background: var(--green-50);  color: var(--green-600); }
    .pill-amber  { background: var(--amber-50);  color: var(--amber-600); }
    .pill-red    { background: var(--red-50);    color: var(--red-600); }
    .pill-gray   { background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-default); }
    .pill-blue   { background: var(--blue-50);   color: var(--blue-800); }
    .pill-purple { background: var(--purple-50); color: var(--purple-800); }

    /* ── Media Type Badge ── */
    .badge-video  { background: var(--blue-50);   color: var(--blue-800);   border: 0.5px solid #B5D4F4; }
    .badge-audio  { background: var(--green-50);  color: var(--green-700);  border: 0.5px solid #C0DD97; }
    .badge-anc    { background: var(--purple-50); color: var(--purple-800); border: 0.5px solid #AFA9EC; }

    /* ── Accordion Card (Node/Sender/Receiver) ── */
    .acc-card { border: 0.5px solid var(--border-default); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
    .acc-card.highlighted { border: 1.5px solid var(--blue-600) !important; }
    .acc-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; background: var(--bg-primary);
      transition: background 0.15s;
    }
    .acc-header:hover { background: var(--bg-secondary); }
    .acc-header.highlighted { background: var(--blue-50); }
    .acc-label { flex: 1; font-size: 13px; font-weight: 500; }
    .acc-meta { font-size: 11px; color: var(--text-secondary); }
    .acc-chevron { font-size: 9px; color: var(--text-tertiary); transition: transform 0.2s ease; flex-shrink: 0; }
    .acc-body { display: none; border-top: 0.5px solid var(--border-default); padding: 12px 14px; background: var(--bg-secondary); }
    .acc-body.open { display: block; }

    /* ── Device Card (nested) ── */
    .dev-card { border: 0.5px solid var(--border-default); border-radius: 8px; overflow: hidden; margin-bottom: 6px; background: var(--bg-primary); }
    .dev-header { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; transition: background 0.15s; }
    .dev-header:hover { background: var(--bg-secondary); }
    .dev-icon { width: 18px; height: 18px; border-radius: 4px; background: var(--blue-50); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dev-label { flex: 1; font-size: 12px; font-weight: 500; }
    .dev-id { font-size: 10px; font-family: monospace; color: var(--text-tertiary); }
    .dev-body { display: none; border-top: 0.5px solid var(--border-default); padding: 10px 12px; background: var(--bg-secondary); }
    .dev-body.open { display: block; }

    /* ── Resource Chips ── */
    .resource-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .resource-row-label { font-size: 10px; color: var(--text-tertiary); width: 64px; flex-shrink: 0; padding-top: 3px; }
    .chips-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
    .resource-chip {
      font-size: 11px; padding: 3px 9px; border-radius: 99px; border: 0.5px solid;
      background: var(--bg-primary); font-family: monospace; cursor: pointer;
      display: inline-block; transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .resource-chip:hover { background: var(--blue-50); color: var(--blue-800) !important; border-color: #B5D4F4 !important; }
    .chip-sender   { border-color: #C0DD97; color: var(--green-600); }
    .chip-receiver { border-color: #AFA9EC; color: var(--purple-600); }
    .chip-source   { border-color: #FAC775; color: var(--amber-600); }
    .chip-hint { font-size: 10px; color: var(--text-tertiary); font-style: italic; margin-top: 4px; }

    /* ── Detail Grid ── */
    .detail-grid { display: grid; grid-template-columns: 100px 1fr; gap: 4px 10px; font-size: 12px; margin-bottom: 10px; }
    .dg-key { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em; padding-top: 2px; }
    .dg-val { color: var(--text-primary); word-break: break-all; font-family: monospace; font-size: 11px; }

    /* ── Nav Hint ── */
    .nav-hint {
      display: none; font-size: 11px; color: var(--blue-800);
      background: var(--blue-50); border-radius: 4px;
      padding: 4px 10px; margin-bottom: 10px; width: fit-content;
    }

    /* ── Status Dot (node health) ── */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot-ok      { background: #28C840; }
    .status-dot-delayed { background: #FEBC2E; }
    .status-dot-expired { background: #E24B4A; }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

    /* ── SDP Section ── */
    .sdp-loading { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); padding: 8px 0; }
    .sdp-label { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em; margin-bottom: 4px; }
    .sdp-box {
      background: var(--bg-secondary); border: 0.5px solid var(--border-default);
      border-radius: 8px; padding: 8px 10px; font-family: monospace; font-size: 10px;
      color: var(--text-mono); line-height: 1.6; margin-bottom: 8px;
      white-space: pre; overflow-x: auto; max-height: 200px; overflow-y: auto;
    }
    .sdp-error { background: var(--amber-50); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .sdp-error-text { font-size: 12px; color: var(--amber-600); margin-bottom: 6px; line-height: 1.5; }
    .sdp-url-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 2px; }
    .sdp-url-value { font-family: monospace; font-size: 11px; color: var(--amber-600); word-break: break-all; margin-right: 8px; }

    /* ── Connection Box ── */
    .conn-box { border: 0.5px solid var(--border-default); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; background: var(--bg-primary); }
    .conn-box-title { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em; margin-bottom: 8px; }
    .conn-sender-row { display: flex; align-items: center; gap: 10px; }
    .conn-sender-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--green-50); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .conn-sender-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }
    .conn-sender-detail { font-size: 11px; color: var(--text-secondary); font-family: monospace; }
    .not-connected { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-tertiary); }

    /* ── Warning Note ── */
    .warn-note { background: var(--amber-50); color: var(--amber-600); border-radius: 8px; padding: 7px 10px; font-size: 11px; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }

    /* ── Log Viewer ── */
    .log-level-bar { display: flex; align-items: center; gap: 8px; padding: 7px 16px; border-bottom: 0.5px solid var(--border-default); background: var(--bg-secondary); font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
    .log-table-wrap { flex: 1; overflow-y: auto; }
    .log-footer { display: flex; align-items: center; gap: 12px; padding: 6px 16px; border-top: 0.5px solid var(--border-default); background: var(--bg-secondary); font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
    .log-live { display: flex; align-items: center; }
    .log-errors   { color: var(--red-600); }
    .log-warnings { color: var(--amber-600); }

    /* ── Recent Activity (Overview) ── */
    .activity-box { border: 0.5px solid var(--border-default); border-radius: 12px; overflow: hidden; margin-top: 12px; }
    .activity-header { padding: 7px 12px; background: var(--bg-secondary); border-bottom: 0.5px solid var(--border-default); font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .activity-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 3px; }
    .activity-line { font-size: 11px; font-family: monospace; }
    .act-info    { color: var(--text-secondary); }
    .act-warn    { color: var(--amber-600); }
    .act-error   { color: var(--red-600); }
    .act-success { color: var(--green-600); }

    /* ── Settings Form ── */
    .settings-section-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 0.5px solid var(--border-default); letter-spacing: 0.04em; }
    .setting-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid #f0f0f0; }
    .setting-row:last-child { border-bottom: none; }
    .setting-info { flex: 1; }
    .setting-label { font-size: 13px; color: var(--text-primary); margin-bottom: 2px; }
    .setting-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
    .setting-control { flex-shrink: 0; }
    .s-input { font-size: 12px; padding: 5px 8px; border-radius: 8px; border: 0.5px solid var(--border-medium); background: var(--bg-primary); color: var(--text-primary); }
    .s-input:focus { outline: none; border-color: var(--blue-600); }
    .s-input[readonly] { background: var(--bg-secondary); cursor: default; }
    .s-select { font-size: 12px; padding: 5px 8px; border-radius: 8px; border: 0.5px solid var(--border-medium); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; }
    .settings-about { background: var(--bg-secondary); border-radius: 8px; padding: 12px 14px; font-size: 12px; color: var(--text-secondary); line-height: 1.8; }
    .settings-about a { color: var(--blue-600); text-decoration: none; }
    .restart-notice { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--amber-600); background: var(--amber-50); border-radius: 8px; padding: 6px 10px; margin-top: 12px; margin-bottom: 16px; }
    .settings-buttons { display: flex; gap: 8px; align-items: center; }
    .btn-save-restart { padding: 8px 20px; border-radius: 8px; border: none; background: var(--blue-600); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-save-restart:hover { background: var(--blue-800); }
    .btn-save-restart:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-save-only { padding: 8px 20px; border-radius: 8px; border: 0.5px solid var(--border-medium); background: transparent; color: var(--text-primary); font-size: 13px; cursor: pointer; }
    .btn-save-only:hover { background: var(--bg-secondary); }
    .btn-save-only:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-stop-rds { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #F09595; background: transparent; color: var(--red-600); font-size: 13px; cursor: pointer; margin-left: auto; }
    .btn-stop-rds:hover { background: var(--red-50); }
    .inline-warn { font-size: 11px; color: var(--amber-600); margin-top: 3px; }

    /* ── Common Buttons ── */
    .btn-sm { font-size: 11px; padding: 4px 10px; border-radius: 8px; border: 0.5px solid var(--border-medium); background: transparent; color: var(--text-secondary); cursor: pointer; }
    .btn-sm:hover { background: var(--bg-secondary); }
    .btn-sm.green  { border-color: #C0DD97; color: var(--green-600); }
    .btn-sm.green:hover { background: var(--green-50); }
    .btn-sm.amber  { border-color: #FAC775; color: var(--amber-600); background: transparent; }
    .btn-sm.amber:hover { background: var(--amber-50); }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-link { font-size: 11px; color: var(--blue-600); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }

    /* ── State boxes ── */
    .state-box { padding: 32px; text-align: center; font-size: 12px; color: var(--text-tertiary); border: 0.5px dashed var(--border-default); border-radius: 12px; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-direction: column; }
    .state-error { color: var(--red-600); border-color: #f5c6c6; background: var(--red-50); }
    .state-info-box { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 8px; }
    .state-info-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
    .state-info-body { font-size: 12px; color: var(--text-secondary); text-align: center; max-width: 280px; line-height: 1.6; }

    /* ── Spinner ── */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-default); border-top-color: var(--blue-600); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .spinner-sm { width: 10px; height: 10px; border-width: 1.5px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; font-size: 12px; padding: 6px 16px; border-radius: 8px; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
    .toast.show { opacity: 1; }

    /* ── JSON Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-dialog { background: var(--bg-primary); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; width: 560px; max-height: 70vh; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border-default); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .modal-title { font-size: 14px; font-weight: 500; flex: 1; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-secondary); padding: 2px 6px; border-radius: 4px; }
    .modal-close:hover { background: var(--bg-secondary); }
    .modal-body { flex: 1; overflow-y: auto; padding: 0; }
    .modal-body pre { background: var(--bg-secondary); font-family: monospace; font-size: 11px; line-height: 1.6; padding: 12px 16px; margin: 0; white-space: pre-wrap; }
    .modal-footer { padding: 10px 16px; border-top: 0.5px solid var(--border-default); text-align: right; flex-shrink: 0; }
  </style>
</head>
