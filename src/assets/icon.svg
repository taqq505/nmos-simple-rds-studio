<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="NMOS Simple RDS Studio icon">
  <defs>
    <linearGradient id="g" x1="72" y1="60" x2="440" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#4ee7ff"/>
      <stop offset="0.5" stop-color="#00c4ff"/>
      <stop offset="1"   stop-color="#2f6bff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square border (bigger) -->
  <rect x="60" y="60" width="392" height="392" rx="84"
        fill="none" stroke="url(#g)" stroke-width="24"/>

  <!-- Center: device/robot icon -->
  <!-- Antenna ball + stem -->
  <circle cx="256" cy="146" r="16" fill="url(#g)"/>
  <line x1="256" y1="162" x2="256" y2="196" stroke="url(#g)" stroke-width="18" stroke-linecap="round"/>

  <!-- Body: rounded rectangle -->
  <rect x="164" y="196" width="184" height="124" rx="22"
        fill="none" stroke="url(#g)" stroke-width="18"/>

  <!-- 3 dots inside body -->
  <g fill="url(#g)">
    <circle cx="210" cy="258" r="16"/>
    <circle cx="256" cy="258" r="16"/>
    <circle cx="302" cy="258" r="16"/>
  </g>
</svg>
